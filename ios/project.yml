name: TheAcademy
options:
  bundleIdPrefix: com.theacademy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  TheAcademy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheAcademy
        excludes:
          - "Fixtures/**"
          - "TheAcademy.entitlements"
      - path: TheAcademy/Fixtures
        type: folder
        buildPhase: resources
    entitlements:
      path: TheAcademy/TheAcademy.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theacademy.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: The Academy
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "The Academy uses the microphone so you can speak to your professor."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "The Academy transcribes your speech so the professor can respond."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        # Simulator/CI builds need no team; flip to your team in Xcode's
        # Signing pane (required on device for Sign in with Apple).
        CODE_SIGNING_ALLOWED: NO
